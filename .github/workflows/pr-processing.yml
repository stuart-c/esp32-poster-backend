name: PR Processing
on:
  pull_request:
    branches: [ "main" ]
    paths:
      - 'processing/**'
      - '.github/workflows/pr-processing.yml'

jobs:
  test-processing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: if [ -f processing/requirements.txt ]; then pip install -r processing/requirements.txt; fi
      - name: Run pytest
        run: if [ -d processing/tests ]; then pytest processing/; else echo "No processing tests yet"; fi
