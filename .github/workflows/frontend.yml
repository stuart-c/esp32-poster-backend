name: Frontend CI/CD
on:
  push:
    branches: [ "main" ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: if [ -f frontend/package.json ]; then npm ci --prefix frontend; fi
      - name: Run vitest
        run: if [ -f frontend/package.json ]; then npm run test --prefix frontend; else echo "No frontend tests yet"; fi

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Deploy Frontend
        run: echo "Deploy Frontend (e.g. build Vite and sync to S3) goes here"
